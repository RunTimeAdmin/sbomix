# ──────────────────────────────────────────────────────────────────────────────
# PackrAI SBOM — full annotated example
#
# Copy this file to .github/workflows/sbom.yml in your repository.
# Minimal version (just SBOM generation + artifact upload):
#
#   jobs:
#     sbom:
#       runs-on: ubuntu-latest
#       steps:
#         - uses: actions/checkout@v4
#         - uses: RunTimeAdmin/PACKRAI@v1
#           with:
#             format: both
#             upload-artifact: true
# ──────────────────────────────────────────────────────────────────────────────

name: SBOM

on:
  # Generate on every push to main
  push:
    branches: [main, master]

  # Generate on every PR and post a summary comment
  pull_request:

  # Weekly scheduled scan to catch newly-disclosed vulnerabilities
  schedule:
    - cron: '0 3 * * 1'   # every Monday 03:00 UTC

  # Allow manual re-runs from the Actions tab
  workflow_dispatch:

# Minimum permissions required by PackrAI + PR comment step
permissions:
  contents: read
  pull-requests: write

jobs:
  sbom:
    name: Generate SBOM
    runs-on: ubuntu-latest

    steps:
      # ── 1. Check out the project ───────────────────────────────────────────
      - name: Checkout
        uses: actions/checkout@v4

      # ── 2. Run PackrAI ─────────────────────────────────────────────────────
      #
      # Inputs:
      #   directory        Directory to scan (default: repo root)
      #   format           Output format: both | cyclonedx | spdx
      #   output-dir       Where to write bom.cyclonedx.json / bom.spdx.json
      #   fail-on-critical Block merge if CVSS >= 9.0 vulnerabilities found
      #   upload-artifact  Upload SBOMs as Actions artifacts (90-day retention)
      #   skip-vulns       Set to true to skip OSV enrichment (faster, offline)
      #   api-url          PackrAI central API endpoint (optional)
      #   api-key          PackrAI API key — store in repository secrets
      #
      # Outputs (available as ${{ steps.sbom.outputs.* }}):
      #   cyclonedx-path      Path to generated CycloneDX 1.6 JSON
      #   spdx-path           Path to generated SPDX 2.3 JSON
      #   component-count     Total packages enumerated
      #   vulnerability-count Known vulnerabilities (via OSV)
      #   critical-count      CVSS >= 9.0 vulnerabilities
      #   quality-score       SBOM completeness score 0-100
      - name: PackrAI
        id: sbom
        uses: RunTimeAdmin/PACKRAI@v1
        with:
          format: both
          output-dir: sbom
          fail-on-critical: true      # set to false to warn without blocking
          upload-artifact: true
          skip-vulns: false           # set to true for offline / faster scans
          api-url: ${{ vars.SBOMIX_API_URL }}
          api-key: ${{ secrets.SBOMIX_API_KEY }}

      # ── 3. Print scan summary (visible in the Actions log) ────────────────
      - name: Print summary
        if: always()
        run: |
          echo "Components:      ${{ steps.sbom.outputs.component-count }}"
          echo "Vulnerabilities: ${{ steps.sbom.outputs.vulnerability-count }}"
          echo "Critical:        ${{ steps.sbom.outputs.critical-count }}"
          echo "Quality score:   ${{ steps.sbom.outputs.quality-score }}/100"
          echo "CycloneDX:       ${{ steps.sbom.outputs.cyclonedx-path }}"
          echo "SPDX:            ${{ steps.sbom.outputs.spdx-path }}"

  # ── Optional: scan a monorepo with multiple projects ──────────────────────
  # Uncomment and adapt this job if your repo has sub-projects in subdirs.
  #
  # sbom-monorepo:
  #   runs-on: ubuntu-latest
  #   strategy:
  #     matrix:
  #       project: [services/api, services/worker, frontend]
  #   steps:
  #     - uses: actions/checkout@v4
  #     - uses: RunTimeAdmin/PACKRAI@v1
  #       with:
  #         directory: ${{ matrix.project }}
  #         output-dir: sbom/${{ matrix.project }}
  #         upload-artifact: true
