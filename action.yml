name: 'SBOMix SBOM Generator'
description: 'Generate CycloneDX 1.6 + SPDX 2.3 SBOMs from your project. Fast, accurate, zero-config.'
author: 'SBOMix'

branding:
  icon: 'shield'
  color: 'green'

inputs:
  directory:
    description: 'Directory to scan (default: repo root)'
    required: false
    default: '.'
  format:
    description: 'Output format: both | cyclonedx | spdx'
    required: false
    default: 'both'
  aibom-format:
    description: 'AI-BOM output format: json | yaml'
    required: false
    default: 'json'
  output-dir:
    description: 'Directory to write SBOM files'
    required: false
    default: 'sbom'
  fail-on-critical:
    description: 'Exit with code 1 if critical vulnerabilities are found'
    required: false
    default: 'true'
  upload-artifact:
    description: 'Upload SBOMs as GitHub Actions artifacts (90-day retention)'
    required: false
    default: 'true'
  skip-vulns:
    description: 'Skip OSV vulnerability enrichment (faster, no network required)'
    required: false
    default: 'false'
  profile:
    description: 'Report profile: crypto-agent — adds an Agent Trust Report (MCP tool surface, signing surface, known-bad match) for deployments that hold signing keys'
    required: false
    default: ''
  cra:
    description: 'CRA readiness — set to "true" to add an EU Cyber Resilience Act evidence & gap report (cra-report.json)'
    required: false
    default: ''
  api-url:
    description: 'SBOMix central API endpoint — push SBOMs for org-wide tracking'
    required: false
    default: ''
  api-key:
    description: 'SBOMix API key — use secrets.SBOMIX_API_KEY'
    required: false
    default: ''

outputs:
  cyclonedx-path:
    description: 'Path to generated CycloneDX 1.6 BOM'
    value: ${{ steps.run.outputs.cyclonedx-path }}
  spdx-path:
    description: 'Path to generated SPDX 2.3 BOM'
    value: ${{ steps.run.outputs.spdx-path }}
  aibom-path:
    description: 'Path to generated AI-BOM (only present when AI/ML components are detected)'
    value: ${{ steps.run.outputs.aibom-path }}
  component-count:
    description: 'Total components enumerated'
    value: ${{ steps.run.outputs.component-count }}
  vulnerability-count:
    description: 'Total known vulnerabilities (via OSV)'
    value: ${{ steps.run.outputs.vulnerability-count }}
  critical-count:
    description: 'Critical severity vulnerabilities (CVSS >= 9.0)'
    value: ${{ steps.run.outputs.critical-count }}
  quality-score:
    description: 'SBOM completeness score 0-100'
    value: ${{ steps.run.outputs.quality-score }}
  ai-model-count:
    description: 'Number of AI/ML model components detected'
    value: ${{ steps.run.outputs.ai-model-count }}
  ai-threat-count:
    description: 'Number of AI/ML threats detected'
    value: ${{ steps.run.outputs.ai-threat-count }}
  agent-trust-report-json-path:
    description: 'Path to the Agent Trust Report JSON manifest (only present with profile: crypto-agent)'
    value: ${{ steps.run.outputs.agent-trust-report-json-path }}
  agent-trust-report-html-path:
    description: 'Path to the Agent Trust Report HTML (only present with profile: crypto-agent)'
    value: ${{ steps.run.outputs.agent-trust-report-html-path }}

runs:
  using: 'composite'
  steps:
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: Install SBOMix dependencies
      shell: bash
      run: npm install --prefix "$GITHUB_ACTION_PATH" --omit=dev --no-audit --no-fund

    - name: Generate SBOM
      id: run
      shell: bash
      env:
        SCAN_DIR: ${{ inputs.directory }}
        SCAN_FORMAT: ${{ inputs.format }}
        SCAN_AIBOM_FORMAT: ${{ inputs.aibom-format }}
        SCAN_OUT: ${{ inputs.output-dir }}
        SKIP_VULNS: ${{ inputs.skip-vulns }}
        SCAN_PROFILE: ${{ inputs.profile }}
        SCAN_CRA: ${{ inputs.cra }}
      run: |
        set -e

        SBOMIX="node $GITHUB_ACTION_PATH/bin/sbomix.js"
        ARGS="$SCAN_DIR --format $SCAN_FORMAT --aibom-format $SCAN_AIBOM_FORMAT --out $SCAN_OUT"
        [ "$SKIP_VULNS" = "true" ] && ARGS="$ARGS --no-vulns"
        [ -n "$SCAN_PROFILE" ] && ARGS="$ARGS --profile $SCAN_PROFILE"
        [ "$SCAN_CRA" = "true" ] && ARGS="$ARGS --cra"

        $SBOMIX $ARGS --json > /tmp/sbomix-summary.json

        echo "component-count=$(jq -r '.totalComponents'    /tmp/sbomix-summary.json)" >> "$GITHUB_OUTPUT"
        echo "vulnerability-count=$(jq -r '.vulnerabilities' /tmp/sbomix-summary.json)" >> "$GITHUB_OUTPUT"
        echo "critical-count=$(jq -r '.critical'            /tmp/sbomix-summary.json)" >> "$GITHUB_OUTPUT"
        echo "quality-score=$(jq -r '.qualityScore // 0'    /tmp/sbomix-summary.json)" >> "$GITHUB_OUTPUT"
        echo "ai-model-count=$(jq -r '.aiModels // 0'       /tmp/sbomix-summary.json)" >> "$GITHUB_OUTPUT"
        echo "ai-threat-count=$(jq -r '.aiThreats // 0'     /tmp/sbomix-summary.json)" >> "$GITHUB_OUTPUT"

        CDX="${{ inputs.output-dir }}/bom.cyclonedx.json"
        SPX="${{ inputs.output-dir }}/bom.spdx.json"
        AIBOM_J="${{ inputs.output-dir }}/aibom.json"
        AIBOM_Y="${{ inputs.output-dir }}/aibom.yaml"
        if [ -f "$CDX" ]; then echo "cyclonedx-path=$CDX" >> "$GITHUB_OUTPUT"; fi
        if [ -f "$SPX" ]; then echo "spdx-path=$SPX" >> "$GITHUB_OUTPUT"; fi
        if [ -f "$AIBOM_J" ]; then
          echo "aibom-path=$AIBOM_J" >> "$GITHUB_OUTPUT"
        elif [ -f "$AIBOM_Y" ]; then
          echo "aibom-path=$AIBOM_Y" >> "$GITHUB_OUTPUT"
        fi

        ATR_J="${{ inputs.output-dir }}/agent-trust-report.json"
        ATR_H="${{ inputs.output-dir }}/agent-trust-report.html"
        if [ -f "$ATR_J" ]; then echo "agent-trust-report-json-path=$ATR_J" >> "$GITHUB_OUTPUT"; fi
        if [ -f "$ATR_H" ]; then echo "agent-trust-report-html-path=$ATR_H" >> "$GITHUB_OUTPUT"; fi

    - name: Push to SBOMix API
      if: inputs.api-url != '' && inputs.api-key != ''
      continue-on-error: true
      shell: bash
      env:
        SBOMIX_API_URL: ${{ inputs.api-url }}
        SBOMIX_API_KEY: ${{ inputs.api-key }}
      run: |
        AIBOM_FLAG=""
        AIBOM_FIELD=""
        AIBOM_J="${{ inputs.output-dir }}/aibom.json"
        if [ -f "$AIBOM_J" ]; then
          AIBOM_FLAG="--slurpfile aibom $AIBOM_J"
          AIBOM_FIELD="aibom:\$aibom[0],"
        fi

        jq -n \
          --arg app    "${{ github.repository }}" \
          --arg ver    "${{ github.ref_name }}" \
          --arg commit "${{ github.sha }}" \
          --arg branch "${{ github.ref_name }}" \
          --slurpfile cdx   "${{ inputs.output-dir }}/bom.cyclonedx.json" \
          --slurpfile spdx  "${{ inputs.output-dir }}/bom.spdx.json" \
          --slurpfile stats /tmp/sbomix-summary.json \
          $AIBOM_FLAG \
          "{app:\$app, version:\$ver, commit:\$commit, branch:\$branch,
            cyclonedx:\$cdx[0], spdx:\$spdx[0], stats:\$stats[0], ${AIBOM_FIELD}\"_source\":\"github-action\"}" \
        | curl -sf -X POST "$SBOMIX_API_URL/api/v1/ingest" \
            -H "Authorization: Bearer $SBOMIX_API_KEY" \
            -H "Content-Type: application/json" \
            -d @-

    - name: Upload SBOM artifacts
      if: inputs.upload-artifact == 'true'
      uses: actions/upload-artifact@v7
      with:
        name: sbom-${{ github.sha }}
        path: ${{ inputs.output-dir }}/
        retention-days: 90

    - name: PR comment
      if: github.event_name == 'pull_request'
      uses: actions/github-script@v7
      with:
        script: |
          const fs = require('fs');
          const s = JSON.parse(fs.readFileSync('/tmp/sbomix-summary.json'));
          const badge = s.critical > 0 ? '🔴' : s.vulnerabilities > 0 ? '🟡' : '🟢';
          const sha7  = '${{ github.sha }}'.slice(0, 7);
          const rows = [
            `| Components | **${s.totalComponents}** |`,
            `| Ecosystems | ${(s.ecosystems||[]).join(', ')} |`,
            `| Vulnerabilities | ${s.vulnerabilities} |`,
            `| Critical | ${s.critical} |`,
            `| Quality score | ${s.qualityScore ?? 'N/A'}/100 |`,
            `| Scan time | ${s.elapsedMs}ms |`,
          ];
          if ((s.aiModels || 0) > 0) {
            rows.push(`| AI/ML models | ${s.aiModels} |`);
            rows.push(`| AI threats | ${s.aiThreats || 0} |`);
          }

          let atrSection = '';
          const atrPath = '${{ inputs.output-dir }}/agent-trust-report.json';
          if (fs.existsSync(atrPath)) {
            const atr = JSON.parse(fs.readFileSync(atrPath));
            const es  = atr.execSummary;
            const critFlags = es.flags.filter((f) => f.severity === 'Critical').length;
            const atrBadge  = critFlags > 0 ? '🔴' : es.flags.length > 0 ? '🟡' : '🟢';
            atrSection = [
              '',
              `### ${atrBadge} Agent Trust Report`,
              `MCP servers: **${es.mcpServersDetected}** · Signing surface: **${es.signingSurfaceDetected ? 'yes' : 'no'}** · Least Agency Score: **${es.leastAgencyScore ?? 'n/a'}** · Flags: **${es.flags.length}**`,
              '',
              'Presence detection, not a code audit. See the report artifact for details.',
            ].join('\n');
          }

          const body = [
            `## ${badge} SBOMix SBOM — \`${sha7}\``,
            '',
            '| | |',
            '|---|---|',
            ...rows,
            '',
            s.critical > 0
              ? `> ⚠️ **${s.critical} critical vulnerabilities found.** Review the SBOM artifact before merging.`
              : s.vulnerabilities > 0
              ? `> ${s.vulnerabilities} vulnerabilities found — none critical. Check the SBOM artifact for details.`
              : '> ✅ No known vulnerabilities found.',
            atrSection,
          ].join('\n');
          await github.rest.issues.createComment({
            owner: context.repo.owner, repo: context.repo.repo,
            issue_number: context.issue.number, body,
          });

    - name: Fail on critical
      if: inputs.fail-on-critical == 'true'
      shell: bash
      run: |
        CRITICAL=$(jq -r '.critical' /tmp/sbomix-summary.json)
        if [ "$CRITICAL" -gt "0" ]; then
          echo "::error title=SBOMix::$CRITICAL critical vulnerabilities block this merge. Review the SBOM artifact."
          exit 1
        fi
