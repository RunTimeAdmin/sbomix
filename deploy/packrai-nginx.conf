server {
    listen 80;
    listen [::]:80;
    server_name api.packrai.xyz;

    # Allow Let's Encrypt ACME challenges
    location /.well-known/acme-challenge/ {
        root /var/www/html;
    }

    # Redirect everything else to HTTPS once cert is issued
    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name api.packrai.xyz;

    # TLS — managed by certbot (will be populated after certbot run)
    # ssl_certificate     /etc/letsencrypt/live/api.packrai.xyz/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/api.packrai.xyz/privkey.pem;
    # include             /etc/letsencrypt/options-ssl-nginx.conf;
    # ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # Security headers
    add_header X-Content-Type-Options nosniff;
    add_header X-Frame-Options DENY;
    add_header Referrer-Policy strict-origin-when-cross-origin;

    # Proxy to PackrAI API
    location / {
        proxy_pass         http://127.0.0.1:3080;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
        client_max_body_size 10m;
    }
}
