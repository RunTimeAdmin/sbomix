name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  test:
    name: Test (Node ${{ matrix.node }})
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node: ['18', '20', '22']

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Dependency audit
        run: npm audit --omit=dev --audit-level=high

  integration:
    name: Integration (Postgres)
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER:     sbomix
          POSTGRES_PASSWORD: sbomix
          POSTGRES_DB:       sbomix_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U sbomix"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      DATABASE_URL: postgres://sbomix:sbomix@localhost:5432/sbomix_test
      HMAC_SECRET:  ci-integration-hmac-secret

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install dependencies (CLI + API)
        run: |
          npm ci
          npm ci --prefix src/api

      - name: Load database schema
        run: psql "$DATABASE_URL" -f src/api/schema.sql

      - name: Run integration tests
        run: node --test tests/integration.test.js

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - run: npm ci
      - run: npm run lint

  pack:
    name: Pack (publishability check)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - run: npm ci
      - name: Dry-run npm pack
        run: npm pack --dry-run

  cli-smoke:
    name: CLI smoke test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - run: npm ci

      - name: Scan fixture directory (standard)
        run: |
          node bin/sbomix.js ./tests/fixtures --no-vulns --no-licenses --json --out /tmp/sbomix-out
          test -f /tmp/sbomix-out/bom.cyclonedx.json
          test -f /tmp/sbomix-out/bom.spdx.json

      - name: Verify component count
        run: |
          COUNT=$(node -e "const f=require('/tmp/sbomix-out/bom.cyclonedx.json'); console.log(f.components.length)")
          echo "Component count: $COUNT"
          [ "$COUNT" -gt 10 ] || (echo "Expected >10 components, got $COUNT" && exit 1)

      - name: Scan AI fixture and verify AI-BOM output
        run: |
          node bin/sbomix.js ./tests/fixtures/ai \
            --no-vulns --no-licenses --json --out /tmp/ai-out \
            > /tmp/ai-summary.json

          # aibom.json must be written (triggered by ML packages in requirements.txt)
          test -f /tmp/ai-out/aibom.json || (echo "aibom.json not written by CLI" && exit 1)

          # aibom must have detected AI components (not just empty)
          AI_COMPS=$(jq -r '.components | length' /tmp/ai-out/aibom.json)
          echo "AI components in aibom.json: $AI_COMPS"
          [ "$AI_COMPS" -gt 0 ] || (echo "Expected AI components in aibom.json, got $AI_COMPS" && exit 1)

          echo "Threats: $(jq -r '.threats | length' /tmp/ai-out/aibom.json)"

  semgrep:
    name: Semgrep (security static analysis)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v6
        with:
          python-version: '3.x'
      - name: Install semgrep
        run: pip install semgrep
      - name: Scan for security issues
        run: semgrep scan --config=p/nodejs --config=p/secrets --severity=ERROR --error src/ bin/
